<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      @media (prefers-color-scheme: light) {
        .bg { fill: #1e40af; }
        .tooth { fill: #ffffff; stroke: #1e40af; }
      }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #ffffff; }
        .tooth { fill: #1e40af; stroke: #ffffff; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="200" height="200" rx="40"/>
  
  <!-- Tooth shape -->
  <g transform="translate(100, 100)">
    <path class="tooth" 
      d="M -20 -45 Q -28 -25 -28 0 Q -28 35 0 55 Q 28 35 28 0 Q 28 -25 20 -45 Z" 
      stroke-width="1.5" stroke-linejoin="round"/>
    
    <!-- Highlight on tooth -->
    <ellipse cx="-10" cy="-18" rx="5" ry="10" fill="currentColor" opacity="0.2"/>
  </g>
</svg>